name: Update navbar primary action

on:
  push:
    paths:
      - .github/workflows/update-navbar-primary.yml

permissions:
  contents: write

jobs:
  update-navbar:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Change navbar primary action
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("app/page.tsx")
          text = path.read_text(encoding="utf-8")
          old = '''            <Link
              href="/signup"
              className="cta-glow rounded-xl bg-brand-500 px-4 py-2 text-sm font-semibold text-night-900 transition hover:bg-brand-400"
            >
              Create business account
            </Link>'''
          new = '''            <Link
              href="/start"
              className="cta-glow rounded-xl bg-brand-500 px-4 py-2 text-sm font-semibold text-night-900 transition hover:bg-brand-400"
            >
              Order from store
            </Link>'''

          matches = text.count(old)
          if matches != 1:
              raise SystemExit(f"Expected exactly one navbar CTA match, found {matches}")

          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Remove one-time workflow and commit
        run: |
          rm .github/workflows/update-navbar-primary.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/page.tsx .github/workflows/update-navbar-primary.yml
          git commit -m "fix: make order from store the navbar primary action"
          git push origin HEAD:main
